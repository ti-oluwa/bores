site_name: BORES
site_description: Open-source 3D three-phase black-oil reservoir modelling and simulation framework in Python. Features IMPES/Sequential Implicit solvers, PVT correlations, well controls, and comprehensive visualization tools for petroleum engineering.
site_author: ti-oluwa
site_url: https://ti-oluwa.github.io/bores

repo_name: ti-oluwa/bores
repo_url: https://github.com/ti-oluwa/bores
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2025 ti-oluwa

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  logo: images/logo.svg
  favicon: images/logo.svg

  font:
    text: DM Sans
    code: Roboto Mono

  language: en

  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    # - navigation.instant
    - navigation.instant.prefetch
    # - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

  # SEO: Auto-generate social media preview cards (Open Graph, Twitter)
  - social:
      cards: true
      cards_layout_options:
        background_color: "#008080"  # Teal to match theme
        color: "#ffffff"

  # SEO: Show last updated date (signals content freshness to search engines)
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true

  # SEO: Add structured metadata to pages
  - meta

  # SEO: Tag pages for better categorization and internal linking
  - tags

  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
      cache_safe: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  # SEO: Social media links (helps with brand authority)
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ti-oluwa
      name: GitHub Profile
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/bores-framework/
      name: PyPI Package

  # SEO: Versioning
  version:
    provider: mike

  # SEO: Keywords for better discoverability
  tags:
    Reservoir Simulation: reservoir-simulation
    Black Oil: black-oil
    Petroleum Engineering: petroleum-engineering
    Python: python
    Numerical Methods: numerical-methods
    IMPES: impes
    Finite Difference: finite-difference
    Oil and Gas: oil-gas

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

